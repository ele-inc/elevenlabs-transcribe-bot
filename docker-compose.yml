version: "3.8"

services:
  bot:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
    volumes:
      # 文字起こし結果をローカルに保存
      - ./transcripts:/app/transcripts
      # 一時ファイル用ボリューム
      - tmp-data:/tmp
    restart: unless-stopped

volumes:
  tmp-data:
