steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/scribe-bot/app:$COMMIT_SHA', '.']
  
  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/scribe-bot/app:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'scribe-bot'
    - '--image'
    - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/scribe-bot/app:$COMMIT_SHA'
    - '--region'
    - 'asia-northeast1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--memory'
    - '8Gi'
    - '--cpu'
    - '4'
    - '--timeout'
    - '3600'
    - '--max-instances'
    - '10'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/scribe-bot/app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY